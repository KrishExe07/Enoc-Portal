<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Documents | Student</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .card { background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: var(--spacing-lg); }
        .document-list { padding-top: var(--spacing-md); }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <img src="images/charusat-logo.png" class="logo-img">
                    <div class="college-info"><h1>CHARUSAT Portal</h1></div>
                </div>
                <nav class="main-nav">
                    <ul>
                        <li><a href="student-dashboard.html">Dashboard</a></li>
                        <li><button class="btn btn-logout" onclick="portalUtils.logout()">Logout</button></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <main class="container mt-3" style="max-width: 800px; min-height: 70vh;">
        <div class="section-header">
            <h3>Upload Documents</h3>
            <p class="section-subtitle">Attach requested files to your NOC and Internship applications</p>
        </div>
        <div id="uploadList" class="mt-2">
            <div class="text-center" style="padding: 3rem;">
                <p>Loading applications...</p>
            </div>
        </div>
    </main>
    <footer class="main-footer "><div class="container footer-bottom">© 2024 CHARUSAT University. All rights reserved.</div></footer>

    <script src="js/main.js"></script>
    <script src="js/api-service.js"></script>
    <script>
        async function renderUploadList(){
            if (!utils.isLoggedIn()) { window.location.href = 'index.html'; return; }
            
            const container = document.getElementById('uploadList');
            try {
                const res = await apiService.getMyNOCs();
                if (!res.success) throw new Error(res.message);
                
                const apps = res.requests || [];
                if (apps.length === 0) { 
                    container.innerHTML = '<div class="card text-center text-muted">No applications found. You need to apply for an NOC first.</div>'; 
                    return; 
                }
                
                let html = '';
                apps.forEach(a => {
                    html += `
                    <div class="card mb-3">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <h4 style="margin: 0; color: var(--primary-color);">📄 ${a.nocId || a.id} - Application</h4>
                            <span class="badge status-${a.status}">${a.status}</span>
                        </div>
                        <p class="text-muted" style="margin-bottom: 1.5rem">Select a PDF, PNG, or JPEG file to append to your application. Maximum size 5MB.</p>
                        
                        <div id="docs-${a.id}" class="document-list mb-2">
                            <!-- Existing files could be listed here if model supported it -->
                        </div>
                        
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <input type="file" accept="application/pdf, image/jpeg, image/png" id="file-${a.id}" class="form-control" style="background:#fff; border: 1px solid var(--gray-300); padding: 0.5rem; border-radius: var(--radius-sm); flex: 1;"> 
                            <button class="btn btn-primary" onclick="uploadDocument('${a.id}')" id="btnUpload-${a.id}">Upload File</button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            } catch(e) {
                console.error(e);
                container.innerHTML = `<div class="card text-center text-danger">Error fetching applications: ${e.message}</div>`;
            }
        }

        async function uploadDocument(appId){
            const input = document.getElementById('file-' + appId);
            const btn = document.getElementById('btnUpload-' + appId);
            
            if (!input.files || !input.files[0]) { 
                portalUtils.showNotification('Select a file to upload', 'warning'); 
                return; 
            }
            
            const file = input.files[0];
            const allowed = ['application/pdf', 'image/jpeg', 'image/png'];
            if (!allowed.includes(file.type)) { 
                portalUtils.showNotification('Only PDF, JPG, or PNG files are allowed', 'warning'); 
                return; 
            }
            if (file.size > 5 * 1024 * 1024) {
                portalUtils.showNotification('File exceeds 5MB limit', 'warning');
                return;
            }

            const formData = new FormData();
            formData.append('document', file);
            
            try {
                btn.textContent = 'Uploading...';
                btn.disabled = true;
                input.disabled = true;
                
                const token = localStorage.getItem('jwt_token');
                const baseUrl = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';
                
                const response = await fetch(`${baseUrl}/api/uploads/document/${appId}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                
                const resData = await response.json();
                
                if (resData.success) {
                    portalUtils.showNotification('Document attached successfully', 'success');
                    input.value = '';
                } else {
                    throw new Error(resData.message || 'Upload failed');
                }
            } catch(e) {
                portalUtils.showNotification(e.message, 'error');
            } finally {
                btn.textContent = 'Upload File';
                btn.disabled = false;
                input.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', renderUploadList);
    </script>
</body>
</html>
